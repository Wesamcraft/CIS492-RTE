    <script>
      (function () {
        // Respect reduced motion preference
        if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
      
        const canvas = document.getElementById('network-canvas');
        if (!canvas) return;
      
        const ctx = canvas.getContext('2d', {
          alpha: true,
          desynchronized: true
        });
      
        if (!ctx) {
          canvas.style.display = 'none';
          return;
        }
      
        /* Constants */
        const POINT_COLOR = 'rgba(182, 6, 212, 0.6)';
        const LINE_COLOR  = 'rgba(182, 6, 212, 0.15)';
        const MAX_DIST    = 120;
      
        let points = [];
        let rafId;
      
        /* Resize canvas */
        const resize = () => {
          canvas.width  = window.innerWidth;
          canvas.height = window.innerHeight;
        };
      
        /* Calculate point count based on area */
        const getPointCount = (w, h) =>
          Math.max(20, Math.floor((w * h) / 15000));
      
        /* Create points */
        const createPoints = (count) => {
          const arr = [];
      
          for (let i = 0; i < count; i++) {
            arr.push({
              x: Math.random() * canvas.width,
              y: Math.random() * canvas.height,
              vx: (Math.random() - 0.5) * 0.3,
              vy: (Math.random() - 0.5) * 0.3,
              radius: Math.random() * 1.5 + 1
            });
          }
      
          return arr;
        };
      
        /* Update point position */
        const updatePoint = (p) => {
          p.x += p.vx;
          p.y += p.vy;
      
          if (p.x < 0 || p.x > canvas.width)  p.vx *= -1;
          if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
        };
      
        /* Draw points */
        const drawPoints = () => {
          ctx.fillStyle = POINT_COLOR;
      
          points.forEach((p) => {
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
            ctx.fill();
            updatePoint(p);
          });
        };
      
        /* Draw connecting lines */
        const drawLines = () => {
          ctx.strokeStyle = LINE_COLOR;
          ctx.lineWidth = 1;
      
          for (let i = 0; i < points.length; i++) {
            for (let j = i + 1; j < points.length; j++) {
              const a = points[i];
              const b = points[j];
              if (!a || !b) continue;
      
              const dx = a.x - b.x;
              const dy = a.y - b.y;
              const dist = Math.sqrt(dx * dx + dy * dy);
      
              if (dist < MAX_DIST) {
                ctx.beginPath();
                ctx.moveTo(a.x, a.y);
                ctx.lineTo(b.x, b.y);
                ctx.stroke();
              }
            }
          }
        };
      
        /* Animation loop */
        const animate = () => {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          drawPoints();
          drawLines();
          rafId = requestAnimationFrame(animate);
        };
      
        /* Init */
        const init = () => {
          resize();
          points = createPoints(getPointCount(canvas.width, canvas.height));
          animate();
        };
      
        init();
      
        window.addEventListener('resize', () => {
          if (rafId) cancelAnimationFrame(rafId);
          init();
        });
      })();
    </script>
